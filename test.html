<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Table Cell Tracker</title>
    <style>
        table { border-collapse: collapse; width: 100%; margin-bottom: 20px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        th { background-color: #f4f4f4; }
        td { cursor: pointer; }
        td:hover { background-color: #f9f9f9; }
        .output { padding: 10px; background: #eef; font-family: monospace; }
    </style>
</head>
<body>

    <table id="myTable">
        <thead>
            <tr>
                <th>ID Column</th>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Role</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>EMP001</td>
                <td>John</td>
                <td>Doe</td>
                <td>Developer</td>
            </tr>
            <tr>
                <td>EMP002</td>
                <td>Jane</td>
                <td>Smith</td>
                <td>Designer</td>
            </tr>
            <tr>
                <td>EMP003</td>
                <td>Alex</td>
                <td>Jones</td>
                <td>Manager</td>
            </tr>
        </tbody>
    </table>

    <div class="output" id="log">Click any cell in the table body...</div>

    <script>
        // Get references to the table and output log elements
        const table = document.getElementById('myTable');
        const log = document.getElementById('log');

        // Add a single event listener to the table body for efficiency
        table.querySelector('tbody').addEventListener('click', function(event) {
            // Find the exact cell (td) that was clicked
            const cell = event.target.closest('td');
            if (!cell) return; // Exit if the click wasn't on a td

            // 1. Get the row and column index
            const colIndex = cell.cellIndex; 
            const rowIndex = cell.parentElement.rowIndex; 

            // 2. Get the text of the very first cell in the clicked row
            const firstCellText = cell.parentElement.cells[0].textContent;

            // 3. Get the corresponding column header text from the thead
            const headerRow = table.querySelector('thead tr');
            const columnName = headerRow.cells[colIndex].textContent;

            // Output the results
            log.innerHTML = `
                <strong>Row Index:</strong> ${rowIndex}<br>
                <strong>Column Index:</strong> ${colIndex}<br>
                <strong>First Cell in Row Text:</strong> "${firstCellText}"<br>
                <strong>Column Header Name:</strong> "${columnName}"
            `;
        });
    </script>

</body>
</html>
